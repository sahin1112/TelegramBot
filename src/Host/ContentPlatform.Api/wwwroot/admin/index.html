<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>İçerik Paneli</title>
<style>
:root{
  --bg:#0f1420; --panel:#171d2b; --panel2:#1e2637; --border:#273246; --text:#e6ebf5;
  --muted:#8a95a8; --accent:#2ec5b6; --accent2:#3a86ff; --danger:#ef5b6b; --warn:#e6a23c;
  --ok:#3fb37f; --radius:12px;
}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:14px}
a{color:var(--accent)}
.app{display:grid;grid-template-columns:230px 1fr;min-height:100vh}
/* Sidebar */
.side{background:var(--panel);border-right:1px solid var(--border);padding:16px 12px;position:sticky;top:0;height:100vh;overflow:auto}
.brand{font-weight:700;font-size:16px;padding:6px 10px 16px;color:#fff;letter-spacing:.3px}
.brand small{display:block;color:var(--muted);font-weight:400;font-size:11px;margin-top:2px}
.nav a{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;color:var(--muted);text-decoration:none;margin-bottom:2px}
.nav a:hover{background:var(--panel2);color:var(--text)}
.nav a.active{background:linear-gradient(90deg,rgba(46,197,182,.18),transparent);color:#fff;box-shadow:inset 2px 0 0 var(--accent)}
.nav .ic{width:18px;text-align:center;opacity:.9}
/* Main */
.main{padding:22px 26px;max-width:1200px}
.head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.head h1{font-size:20px;margin:0}
.head .sub{color:var(--muted);font-size:12px}
/* Cards / tables */
.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px}
.grid{display:grid;gap:14px}
.grid.k4{grid-template-columns:repeat(4,1fr)}
.grid.k3{grid-template-columns:repeat(3,1fr)}
.grid.k2{grid-template-columns:repeat(2,1fr)}
.stat{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.stat .v{font-size:26px;font-weight:700;color:#fff}
.stat .l{color:var(--muted);font-size:12px;margin-top:4px}
table{width:100%;border-collapse:collapse}
th,td{text-align:left;padding:10px 8px;border-bottom:1px solid var(--border);vertical-align:middle}
th{color:var(--muted);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.4px}
tr:hover td{background:rgba(255,255,255,.02)}
/* Controls */
button,select,input,textarea{font:inherit;color:var(--text)}
.btn{background:var(--panel2);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:9px;cursor:pointer}
.btn:hover{border-color:#3a465f}
.btn.pri{background:var(--accent);border-color:var(--accent);color:#04201d;font-weight:600}
.btn.pri:hover{filter:brightness(1.06)}
.btn.dng{background:transparent;border-color:var(--danger);color:var(--danger)}
.btn.dng:hover{background:rgba(239,91,107,.12)}
.btn.sm{padding:5px 9px;font-size:12px;border-radius:7px}
.btn.gho{background:transparent}
select,input[type=text],input[type=number],input[type=password],input[type=datetime-local],textarea{
  background:var(--panel2);border:1px solid var(--border);border-radius:9px;padding:9px 11px;width:100%;outline:none}
input[type=datetime-local]{color-scheme:dark}
select:focus,input:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:90px;line-height:1.5;white-space:pre-wrap}
label{display:block;color:var(--muted);font-size:12px;margin:10px 0 5px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.right{margin-left:auto}
.chip{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid var(--border)}
.chip.ok{color:var(--ok);border-color:rgba(63,179,127,.4);background:rgba(63,179,127,.1)}
.chip.warn{color:var(--warn);border-color:rgba(230,162,60,.4);background:rgba(230,162,60,.1)}
.chip.dng{color:var(--danger);border-color:rgba(239,91,107,.4);background:rgba(239,91,107,.1)}
.chip.mut{color:var(--muted)}
.chip.test{color:#c9a3ff;border-color:rgba(158,110,255,.4);background:rgba(158,110,255,.12)}
/* Tabs */
.tabs{display:flex;gap:6px;margin-bottom:14px;border-bottom:1px solid var(--border)}
.tabs button{background:none;border:none;color:var(--muted);padding:10px 14px;cursor:pointer;border-bottom:2px solid transparent}
.tabs button.active{color:#fff;border-bottom-color:var(--accent)}
/* Preview */
.preview{white-space:pre-wrap;background:var(--panel2);border:1px solid var(--border);border-radius:9px;padding:12px;line-height:1.6;max-height:340px;overflow:auto}
.preview img{max-width:100%;border-radius:8px;margin-top:8px}
.modal img{max-width:100%;height:auto}
.muted{color:var(--muted)}
.s-lbl{width:180px}
.empty{color:var(--muted);text-align:center;padding:34px}
/* Modal */
.overlay{position:fixed;inset:0;background:rgba(4,8,16,.66);display:none;align-items:flex-start;justify-content:center;z-index:50;padding:40px 16px;overflow:auto}
.overlay.on{display:flex}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:16px;width:100%;max-width:820px;padding:20px}
.modal h2{margin:0 0 4px;font-size:17px}
.modal .x{float:right;cursor:pointer;color:var(--muted);font-size:20px;line-height:1}
/* Toast */
#toast{position:fixed;right:18px;bottom:18px;z-index:80;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--panel2);border:1px solid var(--border);border-left:3px solid var(--accent);padding:11px 15px;border-radius:10px;min-width:220px;box-shadow:0 10px 30px rgba(0,0,0,.4)}
.toast.err{border-left-color:var(--danger)}
/* Mobil üst bar + çekmece */
.topbar{display:none}
.scrim{display:none}
@media(max-width:860px){
  .app{grid-template-columns:1fr}
  .topbar{display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:45;background:var(--panel);
    border-bottom:1px solid var(--border);padding:12px 14px;font-weight:700;color:#fff}
  .topbar .mb{background:none;border:none;color:var(--text);font-size:22px;padding:2px 6px;cursor:pointer}
  .side{position:fixed;left:0;top:0;bottom:0;width:250px;height:100vh;transform:translateX(-100%);
    transition:transform .22s ease;z-index:60}
  .side.open{transform:none}
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:55}
  .scrim.on{display:block}
  .main{padding:16px 14px}
  .head{flex-direction:column;align-items:flex-start;gap:10px}
  .head > div:last-child{width:100%}
  .head select,.head input,.head button{width:100%}
  .grid.k4{grid-template-columns:1fr 1fr}
  .grid.k3,.grid.k2{grid-template-columns:1fr}
  .stat .v{font-size:22px}
  .s-lbl{width:100%}
  .card{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{min-width:540px}
  .modal{max-width:100%}
  .overlay{padding:12px 8px}
  .row{gap:8px}
}
@media(max-width:560px){ .grid.k4{grid-template-columns:1fr 1fr} .grid.k3,.grid.k2{grid-template-columns:1fr} table{min-width:480px} }
@media(max-width:400px){ .grid.k4{grid-template-columns:1fr} }
/* Giriş ekranı */
.loginwrap{position:fixed;inset:0;background:radial-gradient(1200px 600px at 30% -10%,rgba(46,197,182,.10),transparent),var(--bg);
  display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.loginwrap.on{display:flex}
.loginbox{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.loginbox h2{margin:0}
</style>
</head>
<body>
<div class="topbar"><button class="mb" id="menuBtn">☰</button><span>İçerik Paneli</span></div>
<div class="scrim" id="scrim"></div>
<div class="app">
  <aside class="side">
    <div class="brand">İçerik Paneli<small>editör kontrol merkezi</small></div>
    <nav class="nav" id="nav">
      <a href="#dashboard"><span class="ic">▚</span> Panel</a>
      <a href="#queue"><span class="ic">☑</span> Onay Kuyruğu</a>
      <a href="#content"><span class="ic">▤</span> İçerikler</a>
      <a href="#add"><span class="ic">✎</span> İçerik Ekle</a>
      <a href="#categories"><span class="ic">▦</span> Kategoriler</a>
      <a href="#scheduled"><span class="ic">⏰</span> Planlanmış</a>
      <a href="#pending"><span class="ic">🖼</span> Görsel Bekleyenler</a>
      <a href="#sources"><span class="ic">⛃</span> Kaynaklar</a>
      <a href="#accounts"><span class="ic">◎</span> Sosyal Hesaplar</a>
      <a href="#publications"><span class="ic">➤</span> Yayınlar</a>
      <a href="#comments"><span class="ic">💬</span> Yorumlar</a>
      <a href="#usage"><span class="ic">$</span> Kullanım / Maliyet</a>
      <a href="#kill"><span class="ic">⛔</span> Acil Durdurma</a>
      <a href="#site"><span class="ic">🌐</span> Site / SEO</a>
      <a href="#settings"><span class="ic">⚙</span> Ayarlar</a>
      <a href="#" id="logout"><span class="ic">⎋</span> Çıkış</a>
    </nav>
  </aside>
  <main class="main" id="view"></main>
</div>
<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>
<div class="loginwrap" id="login"><form class="loginbox" id="loginForm">
  <h2>Giriş</h2><div class="sub muted" style="margin-bottom:16px">İçerik Paneli</div>
  <label>E-posta</label><input id="lg-u" type="text" autocomplete="username">
  <label>Şifre</label><input id="lg-p" type="password" autocomplete="current-password">
  <button class="btn pri" style="width:100%;margin-top:18px" type="submit">Giriş yap</button>
  <div id="lg-err" class="chip dng" style="display:none;margin-top:12px"></div>
</form></div>
<div id="toast"></div>

<script>
const API = "/api/v1";
const $ = (s,r=document)=>r.querySelector(s);
const h = (s)=>String(s??"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const money = n => "$"+Number(n||0).toFixed(4);
function debounce(fn,ms=350){let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms);};}
// Sunucu-tarafı sayfalama çubuğu; kapsayıcıya delege ile [data-pg] tıklaması bağlanır.
function pagerBar(total,page,size){const pages=Math.max(1,Math.ceil((total||0)/size));return `<div class="row" style="margin-top:12px;align-items:center;gap:12px"><button class="btn sm" data-pg="${page-1}" ${page<=1?'disabled':''}>← Önceki</button><span class="muted">Sayfa ${page}/${pages} · ${total||0} kayıt</span><button class="btn sm" data-pg="${page+1}" ${page>=pages?'disabled':''}>Sonraki →</button></div>`;}

function getToken(){ return localStorage.getItem('cp_token'); }
function setToken(t){ t? localStorage.setItem('cp_token',t): localStorage.removeItem('cp_token'); }
async function api(path, opts={}){
  const o = Object.assign({headers:{}}, opts);
  const tok=getToken(); if(tok) o.headers["Authorization"]="Bearer "+tok;
  if(o.body && !(o.body instanceof FormData)){ o.headers["Content-Type"]="application/json"; o.body=JSON.stringify(o.body); }
  const r = await fetch(API+path, o);
  if(r.status===401){ setToken(null); showLogin(); throw new Error('Oturum sona erdi, tekrar giriş yapın'); }
  if(!r.ok){ let m=r.status; try{const e=await r.json(); m=e.message||e.title||JSON.stringify(e);}catch{} throw new Error(m); }
  const t = await r.text(); return t? JSON.parse(t): null;
}
function toast(msg, err=false){ const t=document.createElement('div'); t.className='toast'+(err?' err':''); t.textContent=msg; $('#toast').appendChild(t); setTimeout(()=>t.remove(),3200); }
function openModal(html){ $('#modal').innerHTML=html; $('#overlay').classList.add('on'); }
function closeModal(){ $('#overlay').classList.remove('on'); }
$('#overlay').addEventListener('click',e=>{ if(e.target.id==='overlay') closeModal(); });

const statusChip = s => {
  const map={Published:'ok',Approved:'ok',ReadyToPublish:'ok',PendingReview:'warn',Draft:'warn',Failed:'dng',Rejected:'dng',Archived:'mut',Pending:'warn',Scheduled:'test',Skipped:'mut'};
  return `<span class="chip ${map[s]||'mut'}">${h(s)}</span>`;
};
const riskBadge = r => r==='High' ? '<span class="chip dng">Yüksek risk</span>' : (r==='Medium' ? '<span class="chip warn">Orta risk</span>' : '');
const auditLabel = e => { const m={Created:'Oluşturuldu',Approved:'Onaylandı',Rejected:'Reddedildi',Edited:'Düzenlendi',Generated:'AI üretti',HeldForReview:'İncelemeye alındı',Retracted:'Geri çekildi',Published:'Yayınlandı'}; const c={Approved:'ok',Published:'ok',Rejected:'dng',HeldForReview:'warn',Retracted:'mut'}; return `<span class="chip ${c[e]||'mut'}">${m[e]||h(e)}</span>`; };

/* ---------------- Router ---------------- */
const routes = {
  dashboard:renderDashboard, queue:renderQueue, content:renderContent, add:renderAdd,
  categories:renderCategories, scheduled:renderScheduled, pending:renderPending, sources:renderSources, accounts:renderAccounts,
  publications:renderPublications, comments:renderComments, usage:renderUsage, kill:renderKill, settings:renderSettings, site:renderSite
};
/* Kategori önbelleği + seçici */
let _cats=null;
async function cats(force){ if(force) _cats=null; if(!_cats) _cats=await api('/categories').catch(()=>[]); return _cats; }
function catSelect(id, list, sel){ return `<select id="${id}"><option value="">— kategori yok —</option>${list.map(c=>`<option value="${c.id}" ${sel===c.id?'selected':''}>${h(c.name)}${c.isActive?'':' (kapalı)'}</option>`).join('')}</select>`; }
function catName(list,id){ const c=list.find(x=>x.id===id); return c?c.name:'—'; }
const VIEW_STATE={}; // sayfalı ekranların sayfa/filtre durumu: kaydet→route sonrası korunur, menüden geçişte sıfırlanır
async function route(){
  const key=(location.hash.replace('#','')||'dashboard');
  document.querySelectorAll('#nav a').forEach(a=>a.classList.toggle('active',a.getAttribute('href')==='#'+key));
  const fn=routes[key]||renderDashboard;
  // Eski ekranın #view üzerindeki delege dinleyicilerini temizle (birikip çift tetiklemeyi önler)
  const old=$('#view'); const fresh=old.cloneNode(false); old.parentNode.replaceChild(fresh,old);
  fresh.innerHTML='<div class="empty">Yükleniyor…</div>';
  try{ await fn(); }catch(e){ $('#view').innerHTML=`<div class="card empty">Hata: ${h(e.message)}</div>`; }
}
window.addEventListener('hashchange',()=>{ for(const k in VIEW_STATE) delete VIEW_STATE[k]; route(); });

function head(title,sub,right=''){ return `<div class="head"><div><h1>${h(title)}</h1>${sub?`<div class="sub">${h(sub)}</div>`:''}</div><div>${right}</div></div>`; }
// ISO tarihi <input type="datetime-local"> değerine çevirir (yerel saat, YYYY-MM-DDTHH:mm)
function dtLocal(iso){ if(!iso)return ''; const d=new Date(iso); const p=n=>String(n).padStart(2,'0'); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`; }

/* ---------------- Dashboard ---------------- */
async function renderDashboard(){
  const [queue, published, usage, sources, accounts, channels, pending, catList, kill] = await Promise.all([
    api('/editorial?status=PendingReview&size=1').catch(()=>({total:0})),
    api('/editorial?status=Published&size=1').catch(()=>({total:0})),
    api('/publishing/usage?days=30').catch(()=>({totalUsd:0,totalTry:0,rows:[]})),
    api('/sources').catch(()=>[]),
    api('/social-accounts').catch(()=>[]),
    api('/publishing/channels').catch(()=>({available:[]})),
    api('/editorial/pending-image').catch(()=>[]),
    api('/categories').catch(()=>[]),
    api('/killswitch').catch(()=>[])
  ]);
  const activeSrc=sources.filter(s=>s.isActive).length;
  const activeAcc=accounts.filter(a=>a.status==='Active').length;
  const errAcc=accounts.filter(a=>a.status==='Error').length;
  const chips=(channels.available||[]).map(c=>`<span class="chip ok">${h(c)}</span>`).join(' ')||'<span class="chip mut">kayıtlı kanal yok</span>';
  const engaged=(kill||[]).filter(k=>k.engaged);
  const killBanner=engaged.length?`<div class="card" style="border-color:var(--danger);background:rgba(239,91,107,.08)"><b style="color:var(--danger)">⛔ Acil durdurma etkin (${engaged.length})</b> — ${engaged.map(k=>h(k.scope+(k.key?(':'+k.key):''))).join(', ')}. <a href="#kill">Yönet</a></div>`:'';
  $('#view').innerHTML = head('Panel','Genel durum ve son 30 gün maliyeti') + killBanner + `
    <div class="grid k4">
      <div class="stat"><div class="v">${queue.total??0}</div><div class="l">Onay bekleyen</div></div>
      <div class="stat"><div class="v">${published.total??0}</div><div class="l">Yayınlanan içerik</div></div>
      <div class="stat"><div class="v">${money(usage.totalUsd)}</div><div class="l">30 günlük API maliyeti</div></div>
      <div class="stat"><div class="v">${usage.totalTry?('₺'+Number(usage.totalTry).toFixed(2)):'—'}</div><div class="l">TL karşılığı${usage.usdToTry?` (kur ${usage.usdToTry})`:''}</div></div>
    </div>
    <div class="grid k4">
      <div class="stat"><div class="v">${catList.length}</div><div class="l">Kategori</div></div>
      <div class="stat"><div class="v">${activeSrc}/${sources.length}</div><div class="l">Aktif kaynak</div></div>
      <div class="stat"><div class="v">${activeAcc}/${accounts.length}${errAcc?` <span class="chip dng" style="font-size:11px">${errAcc} hata</span>`:''}</div><div class="l">Aktif sosyal hesap</div></div>
      <div class="stat"><div class="v">${pending.length}</div><div class="l">Görsel bekleyen</div></div>
    </div>
    <div class="card"><h3 style="margin-top:0">Kayıtlı yayın kanalları</h3><div class="row">${chips}</div></div>
    <div class="card"><h3 style="margin-top:0">Hızlı erişim</h3>
      <div class="row"><button class="btn pri" id="d-discover">Şimdi tara</button><a class="btn" href="#queue">Onay Kuyruğu</a><a class="btn" href="#add">İçerik Ekle</a>
      <a class="btn" href="#categories">Kategoriler</a><a class="btn" href="#usage">Kullanım/Maliyet</a><a class="btn" href="#settings">API Anahtarları</a></div>
    </div>`;
  $('#d-discover').onclick=async()=>{ try{ const r=await api('/sources/discover',{method:'POST'}); toast(`Tarandı — ${r.discovered} yeni öğe kuyruğa alındı`); }catch(e){toast(e.message,true);} };
}

/* ---------------- Onay Kuyruğu ---------------- */
async function renderQueue(){
  const items = await api('/editorial/queue');
  const rows = items.map(i=>`
    <tr data-id="${i.id}">
      <td><input type="checkbox" class="q-sel" value="${i.id}"></td>
      <td><a href="#" class="q-prev">${h(i.title||'(başlıksız)')}</a> ${riskBadge(i.riskLevel)}<div class="muted" style="font-size:12px">${h(i.origin)}</div></td>
      <td><select class="q-img">
        <option value="SkiaCard">SkiaCard (başlık kartı)</option>
        <option value="Ai">AI görsel</option>
        <option value="Manual">Ben yükleyeceğim</option>
      </select></td>
      <td><label class="row" style="margin:0"><input type="checkbox" class="q-test" style="width:auto"> Test</label></td>
      <td><input type="datetime-local" class="q-when" title="Boş = kategori kadansı / hemen"></td>
      <td class="row"><button class="btn pri sm q-ok">Onayla</button><button class="btn dng sm q-no">Reddet</button></td>
    </tr>`).join('');
  $('#view').innerHTML = head('Onay Kuyruğu','Tamamlanıp "Onaya gönder" ile buraya düşen içerikler. RSS içerikleri önce Taslak olarak gelir (İçerikler → Taslak); üretip onaya gönderirsin. Zaman boşsa kategori kadansına göre planlanır.',
    `<button class="btn pri" id="bulk">Seçilenleri Onayla</button>`) +
    `<div class="card"><table><thead><tr><th style="width:30px"></th><th>İçerik</th><th style="width:200px">Görsel kaynağı</th><th style="width:70px">Mod</th><th style="width:190px">Yayın zamanı</th><th style="width:170px"></th></tr></thead>
     <tbody>${rows||'<tr><td colspan=6 class="empty">Kuyruk boş.</td></tr>'}</tbody></table></div>`;

  $('#view').addEventListener('click', async e=>{
    const tr=e.target.closest('tr'); const id=tr?.dataset.id;
    if(e.target.classList.contains('q-ok')){
      const img=tr.querySelector('.q-img').value, test=tr.querySelector('.q-test').checked;
      const w=tr.querySelector('.q-when').value; const scheduledAt=w?new Date(w).toISOString():null;
      try{ await api(`/editorial/${id}/approve`,{method:'POST',body:{imageSource:img,testMode:test,scheduledAt}}); toast('Onaylandı, üretim sıraya alındı'); route(); }catch(e){toast(e.message,true);}
    }
    if(e.target.classList.contains('q-no')){ try{ await api(`/editorial/${id}/reject`,{method:'POST'}); toast('Reddedildi'); route(); }catch(e){toast(e.message,true);} }
    if(e.target.classList.contains('q-prev')){ e.preventDefault(); showDetail(id); }
  });
  $('#bulk').onclick=async()=>{
    const ids=[...document.querySelectorAll('.q-sel:checked')].map(c=>c.value);
    if(!ids.length) return toast('Seçim yok',true);
    try{ const r=await api('/editorial/bulk-approve',{method:'POST',body:{ids}}); toast(`${r.approved}/${r.total} onaylandı`); route(); }catch(e){toast(e.message,true);}
  };
}

/* ---------------- İçerikler ---------------- */
async function renderContent(){
  const statuses=['','PendingReview','Draft','Approved','Published','Failed','Archived','Rejected'];
  const sel = statuses.map(s=>`<option value="${s}">${s||'Tümü'}</option>`).join('');
  $('#view').innerHTML = head('İçerikler','Başlıkta ara, duruma göre filtrele; satıra tıkla → düzenle / önizle / yayınlar',
    `<div class="row"><input id="cq" type="text" placeholder="Başlıkta ara…" style="width:220px"><select id="fstatus" style="width:160px">${sel}</select></div>`);
  const box=document.createElement('div'); box.className='card'; box.id='clist'; $('#view').appendChild(box);
  const S=VIEW_STATE.content||(VIEW_STATE.content={page:1,q:'',status:''});
  $('#fstatus').value=S.status; $('#cq').value=S.q;
  const SIZE=25; let page=S.page;
  async function load(){
    const st=$('#fstatus').value, q=$('#cq').value.trim();
    S.page=page; S.status=st; S.q=q;
    const r=await api(`/editorial?size=${SIZE}&page=${page}${st?`&status=${st}`:''}${q?`&q=${encodeURIComponent(q)}`:''}`);
    box.innerHTML = `<table><thead><tr><th>Başlık</th><th style="width:120px">Durum</th><th style="width:90px">Risk</th><th style="width:110px">Medya</th><th style="width:70px">Mod</th><th style="width:150px">Tarih</th></tr></thead><tbody>${
      r.items.map(i=>`<tr data-id="${i.id}" style="cursor:pointer"><td>${h(i.title||'(başlıksız)')}</td><td>${statusChip(i.editorialStatus)}</td><td>${riskBadge(i.riskLevel)}</td><td class="muted">${h(i.mediaStatus)}</td><td>${i.testMode?'<span class=\"chip test\">TEST</span>':''}</td><td class="muted">${new Date(i.createdAt).toLocaleString('tr')}</td></tr>`).join('')||'<tr><td colspan=6 class="empty">Kayıt yok.</td></tr>'
    }</tbody></table>${pagerBar(r.total,r.page,r.size)}`;
    box.querySelectorAll('tr[data-id]').forEach(tr=>tr.onclick=()=>showDetail(tr.dataset.id));
  }
  const reload=()=>{ page=1; S.page=1; load(); };
  $('#fstatus').onchange=reload;
  $('#cq').oninput=debounce(reload,350);
  box.addEventListener('click',e=>{ const b=e.target.closest('[data-pg]'); if(b){ page=Math.max(1,+b.dataset.pg); load(); } });
  await load();
}

async function showDetail(id){
  const d=await api(`/editorial/${id}`);
  const pubsResp=await api(`/publishing/publications?contentItemId=${id}`).catch(()=>({items:[]}));
  const pubs=pubsResp.items||[];
  const auditLog=await api(`/editorial/${id}/audit`).catch(()=>[]);
  const cl=await cats();
  const fLbl=(t,f)=>`<div class="row" style="justify-content:space-between;margin:10px 0 5px"><label style="margin:0">${t}</label><button type="button" class="btn gho sm gen-f" data-f="${f}" title="Bu alanı AI ile üret">✨ AI</button></div>`;
  openModal(`
    <span class="x" onclick="closeModal()">×</span>
    <h2>${h(d.title||'(başlıksız)')}</h2>
    <div class="muted" style="margin-bottom:10px">${statusChip(d.editorialStatus)} ${riskBadge(d.riskLevel)} · medya: ${h(d.mediaStatus)} · görsel: ${h(d.imageSource)} · kategori: ${h(catName(cl,d.categoryId))}${d.scheduledAt?` · planlı: ${new Date(d.scheduledAt).toLocaleString('tr')}`:''} ${d.testMode?'· <span class=\"chip test\">TEST</span>':''}</div>
    ${d.holdReason?`<div class="chip dng" style="display:block;margin-bottom:10px">İncelemeye alındı — ${h(d.holdReason)}</div>`:''}
    <div class="tabs"><button class="active" data-t="edit">Düzenle</button><button data-t="prev">Önizleme</button><button data-t="pub">Yayınlar (${pubs.length})</button><button data-t="audit">Zaman çizelgesi (${auditLog.length})</button></div>
    <div id="tab-edit">
      <div class="card" style="background:var(--panel2);margin-bottom:14px">
        <div class="row" style="justify-content:space-between"><b>✨ AI ile üret</b><button class="btn pri sm" id="gen-all">Tüm alanları üret</button></div>
        <label>Kaynak metin (AI'a gidecek — düzenleyebilirsin)</label>
        <textarea id="e-seed" style="min-height:80px" placeholder="RSS/kaynak metni. Boşsa kayıtlı ham metin kullanılır.">${h(d.rawInput||'')}</textarea>
        <div class="muted" style="font-size:11px">"Tüm alanları üret" bu metinden başlık/kısa/gövde/IG/etiket üretir → yeni revizyon. Tek alan için kutuların yanındaki ✨ düğmesini kullan.</div>
      </div>
      ${fLbl('Başlık','title')}<input id="e-title" type="text" value="${h(d.title)}">
      ${fLbl('Kısa (X) — satır sonları korunur','shortX')}<textarea id="e-short">${h(d.shortX)}</textarea>
      ${fLbl('Ana metin (blog/HTML) — paragraflar korunur','bodyHtml')}<textarea id="e-body" style="min-height:150px">${h(d.bodyHtml)}</textarea>
      ${fLbl('Instagram açıklaması','instagramCaption')}<textarea id="e-ig">${h(d.instagramCaption)}</textarea>
      ${fLbl('Etiketler (virgülle)','tags')}<input id="e-tags" type="text" value="${h((d.tags||[]).join(', '))}">
      <div class="card" style="background:var(--panel2);margin-top:14px">
        <div class="row" style="justify-content:space-between"><b>🖼️ Görsel</b>
          <div class="row" style="margin:0">
            <select id="e-imgsrc" style="width:auto">
              <option value="SkiaCard">SkiaCard (başlık kartı)</option>
              <option value="Ai">AI görsel</option>
              <option value="Manual">Ben yükleyeceğim</option>
            </select>
            <button class="btn pri sm" id="e-imggen">Görseli üret</button>
          </div>
        </div>
        <div id="e-imgupload" class="row" style="display:none;margin-top:8px"><input type="file" id="e-imgfile" accept="image/*"><button class="btn sm" id="e-imgup">Yükle</button></div>
        <div id="e-imgprev" style="margin-top:10px">${d.mediaUrl?`<img src="${h(d.mediaUrl)}" alt="görsel" style="max-width:340px;border-radius:8px;display:block">`:'<span class="muted">Henüz görsel yok.</span>'}</div>
        <div class="muted" style="font-size:11px;margin-top:6px">Görsel burada anlık üretilir/önizlenir (yayınlamaz). SkiaCard ücretsiz, AI görsel ücretlidir.</div>
      </div>
      <div class="row" style="margin-top:14px">
        <button class="btn pri" id="e-save">Kaydet (yeni revizyon)</button>
        ${d.editorialStatus==='Draft'?'<button class="btn pri" id="e-submit" title="İçerik hazırsa onay kuyruğuna gönder">✓ Onaya gönder</button>':''}
        ${d.mediaStatus==='Ready'&&d.editorialStatus!=='Published'?'<button class="btn" id="e-publish">Yayınla</button>':''}
        <label class="row" style="margin:0"><input type="checkbox" id="e-test" ${d.testMode?'checked':''} style="width:auto"> Test modu</label>
        <label class="row" style="margin:0"><input type="checkbox" id="e-adgate" style="width:auto"> Reklam izlet (Adsgram)</label>
        <button class="btn dng right" id="e-retract">Geri çek</button>
      </div>
    </div>
    <div id="tab-prev" style="display:none">
      <h2 style="margin:6px 0 10px;font-size:20px">${h(d.title||'(başlıksız)')}</h2>
      ${d.mediaUrl?`<img src="${h(d.mediaUrl)}" alt="görsel" style="max-width:100%;max-height:420px;border-radius:10px;display:block;margin-bottom:12px">`:'<div class="muted" style="margin-bottom:10px">Görsel yok.</div>'}
      <div class="preview" style="white-space:normal">${d.bodyHtml||'<span class="muted">Gövde yok.</span>'}</div>
      <div class="muted" style="font-size:12px;margin:14px 0 4px">X (Twitter)</div>
      <div class="preview">${h(d.shortX||'—')}</div>
      <div class="muted" style="font-size:12px;margin:12px 0 4px">Instagram</div>
      <div class="preview">${h(d.instagramCaption||'—')}</div>
    </div>
    <div id="tab-pub" style="display:none">
      <table><thead><tr><th>Kanal</th><th>Hedef</th><th>Durum</th><th>Deneme</th><th></th></tr></thead><tbody>${
        pubs.map(p=>`<tr><td>${h(p.channel)}</td><td class="muted">${h(p.targetRef)}</td><td>${statusChip(p.status)}</td><td>${p.attempts}</td><td>${p.status==='Failed'?`<button class="btn sm" onclick="retryPub('${p.id}')">Yeniden dene</button>`:''}</td></tr>`).join('')||'<tr><td colspan=5 class="empty">Henüz yayın yok.</td></tr>'
      }</tbody></table>
    </div>
    <div id="tab-audit" style="display:none">
      <table><thead><tr><th style="width:170px">Zaman</th><th>Olay</th><th>Kim</th><th>Ayrıntı</th></tr></thead><tbody>${
        auditLog.map(a=>`<tr><td class="muted">${new Date(a.at).toLocaleString('tr')}</td><td>${auditLabel(a.event)}</td><td class="muted">${h(a.actorRef)}</td><td class="muted">${h(a.detail||'')}</td></tr>`).join('')||'<tr><td colspan=4 class="empty">Kayıt yok.</td></tr>'
      }</tbody></table>
    </div>`);
  $('#modal').querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>{
    $('#modal').querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active')); b.classList.add('active');
    ['edit','prev','pub','audit'].forEach(t=>$('#tab-'+t).style.display=(t===b.dataset.t?'block':'none'));
  });
  // ✨ AI: tüm alanları üret (yeni revizyon) → yeniden yükle
  $('#gen-all').onclick=async()=>{ const b=$('#gen-all'); b.disabled=true; b.textContent='Üretiliyor…';
    try{ await api(`/editorial/${id}/generate`,{method:'POST',body:{seedInput:$('#e-seed').value||null}}); toast('AI üretti — revizyon oluşturuldu'); showDetail(id); }
    catch(e){ toast(e.message,true); b.disabled=false; b.textContent='Tüm alanları üret'; } };
  // ✨ AI: tek alan üret (kutuya doldur, kaydetmez)
  const fmap={title:'#e-title',shortX:'#e-short',bodyHtml:'#e-body',instagramCaption:'#e-ig',tags:'#e-tags'};
  $('#modal').querySelectorAll('.gen-f').forEach(b=>b.onclick=async()=>{ const f=b.dataset.f, orig=b.textContent; b.disabled=true; b.textContent='…';
    try{ const r=await api('/editorial/generate-field',{method:'POST',body:{field:f,
        title:$('#e-title').value, shortX:$('#e-short').value, bodyHtml:$('#e-body').value,
        instagramCaption:$('#e-ig').value, rawInput:$('#e-seed').value}});
      const el=$(fmap[f]); if(el){ el.value=r.value; } toast('Üretildi'); }
    catch(e){ toast(e.message,true); }
    finally{ b.disabled=false; b.textContent=orig; } });
  $('#e-save').onclick=async()=>{
    const body={ title:$('#e-title').value, shortX:$('#e-short').value, bodyHtml:$('#e-body').value,
      instagramCaption:$('#e-ig').value, tags:$('#e-tags').value.split(',').map(s=>s.trim()).filter(Boolean),
      primaryKeyword:null, imageAltText:null };
    try{ await api(`/editorial/${id}/revision`,{method:'PUT',body}); toast('Kaydedildi'); closeModal(); route(); }catch(e){toast(e.message,true);}
  };
  const subBtn=$('#e-submit'); if(subBtn) subBtn.onclick=async()=>{ try{ await api(`/editorial/${id}/submit-review`,{method:'POST'}); toast('Onaya gönderildi'); closeModal(); route(); }catch(e){toast(e.message,true);} };
  const pubBtn=$('#e-publish'); if(pubBtn) pubBtn.onclick=async()=>{ try{ await api(`/editorial/${id}/publish?adGate=${($('#e-adgate')&&$('#e-adgate').checked)?'true':'false'}`,{method:'POST'}); toast('Yayına gönderildi'); closeModal(); route(); }catch(e){toast(e.message,true);} };
  $('#e-test').onchange=async(ev)=>{ try{ await api(`/editorial/${id}/testmode`,{method:'POST',body:{enabled:ev.target.checked}}); toast('Test modu güncellendi'); }catch(e){toast(e.message,true);} };
  $('#e-retract').onclick=async()=>{ if(!confirm('Geri çekilsin mi?'))return; try{ await api(`/editorial/${id}/retract`,{method:'POST'}); toast('Geri çekildi'); closeModal(); route(); }catch(e){toast(e.message,true);} };
  // 🖼️ Görsel: kaynak seç + anlık üret/yükle + önizleme (yayınlamaz)
  const imgSrc=$('#e-imgsrc');
  if(imgSrc){
    imgSrc.value=d.imageSource||'SkiaCard';
    const syncImg=()=>{ const man=imgSrc.value==='Manual'; $('#e-imgupload').style.display=man?'flex':'none'; $('#e-imggen').style.display=man?'none':'inline-block'; };
    imgSrc.onchange=syncImg; syncImg();
    $('#e-imggen').onclick=async()=>{ const b=$('#e-imggen'); b.disabled=true; b.textContent='Üretiliyor…';
      try{ await api(`/editorial/${id}/preview-image`,{method:'POST',body:{imageSource:imgSrc.value}}); toast('Görsel üretildi'); showDetail(id); }
      catch(e){ toast(e.message,true); b.disabled=false; b.textContent='Görseli üret'; } };
    $('#e-imgup').onclick=async()=>{ const f=$('#e-imgfile').files[0]; if(!f)return toast('Önce dosya seç',true);
      const fd=new FormData(); fd.append('file',f);
      try{ await api(`/editorial/${id}/preview-image/upload`,{method:'POST',body:fd}); toast('Görsel yüklendi'); showDetail(id); }catch(e){toast(e.message,true);} };
  }
}
async function retryPub(id){ try{ const r=await api(`/publishing/publications/${id}/retry`,{method:'POST'}); toast(r.published?'Yayınlandı':'Tekrar denendi'); }catch(e){toast(e.message,true);} }

async function renderCategories(){
  const list=await cats(true);
  $('#view').innerHTML=head('Kategoriler','Sistemin belkemiği — kaynaklar, hedefler ve içerikler kategoriye asılır',
    `<button class="btn pri" id="c-new">Kategori Ekle</button>`)+
    `<div class="card"><table><thead><tr><th>Ad</th><th>Slug</th><th>Dil</th><th>Görsel</th><th>Yayın kadansı</th><th>Reklam/N</th><th>RSS oto-onay</th><th>Durum</th><th style="width:150px"></th></tr></thead><tbody>${
      list.map(c=>`<tr data-id="${c.id}"><td>${h(c.name)}</td><td class="muted">${h(c.slug)}</td><td>${h(c.language||'—')}</td><td>${h(c.defaultImageSource)}</td><td class="muted">${h(cadenceText(c))}</td><td>${c.adEveryNPosts}</td><td>${c.rssAutoApprove?'✓':'—'}</td>
        <td>${c.isActive?'<span class=\"chip ok\">Aktif</span>':'<span class=\"chip mut\">Kapalı</span>'}</td>
        <td class="row"><button class="btn sm c-edit">Düzenle</button><button class="btn sm c-tog">${c.isActive?'Kapat':'Aç'}</button></td></tr>`).join('')||'<tr><td colspan=9 class="empty">Kategori yok. İlk kategoriyi ekleyin.</td></tr>'
    }</tbody></table></div>`;
  $('#c-new').onclick=()=>catForm();
  $('#view').addEventListener('click',async e=>{ const tr=e.target.closest('tr[data-id]'); if(!tr)return; const id=tr.dataset.id;
    if(e.target.classList.contains('c-edit')) catForm(list.find(x=>x.id===id));
    if(e.target.classList.contains('c-tog')){ try{ await api(`/categories/${id}/toggle`,{method:'POST'}); route(); }catch(e){toast(e.message,true);} }
  });
}
function catForm(c){
  const e=c||{name:'',slug:'',language:'tr',defaultImageSource:'SkiaCard',adEveryNPosts:5,rssAutoApprove:false,
    scheduleMode:'Immediate',postsPerDay:0,dailyTimes:'',intervalMinutes:0,timeZoneId:'Europe/Istanbul'};
  const mo=m=>e.scheduleMode===m?'selected':'';
  openModal(`<span class="x" onclick="closeModal()">×</span><h2>${c?'Kategori Düzenle':'Kategori Ekle'}</h2>
    <div class="grid k2">
      <div><label>Ad</label><input id="c-name" type="text" value="${h(e.name)}"></div>
      <div><label>Slug (boş bırak → otomatik)</label><input id="c-slug" type="text" value="${h(e.slug)}"></div>
      <div><label>Dil</label><input id="c-lang" type="text" value="${h(e.language||'')}" placeholder="tr"></div>
      <div><label>Varsayılan görsel</label><select id="c-img"><option ${e.defaultImageSource==='SkiaCard'?'selected':''}>SkiaCard</option><option ${e.defaultImageSource==='Ai'?'selected':''}>Ai</option><option ${e.defaultImageSource==='Manual'?'selected':''}>Manual</option></select></div>
      <div><label>Kaç içerikte bir reklam</label><input id="c-adn" type="number" value="${e.adEveryNPosts}"></div>
      <div><label style="margin-top:26px" class="row"><input type="checkbox" id="c-auto" ${e.rssAutoApprove?'checked':''} style="width:auto"> RSS otomatik onay (onaysız üret)</label></div>
    </div>
    <h3 style="margin:18px 0 4px">Yayın kadansı</h3>
    <div class="muted" style="font-size:12px;margin-bottom:8px">Bu kategorinin içerikleri hangi sıklıkta paylaşılsın? (Test içerik daima anında test kanalına gider.)</div>
    <div class="grid k2">
      <div><label>Mod</label><select id="c-smode">
        <option value="Immediate" ${mo('Immediate')}>Hemen (onaylanınca)</option>
        <option value="DailySlots" ${mo('DailySlots')}>Gün içi sabit saatler</option>
        <option value="Interval" ${mo('Interval')}>Belirli aralıkla</option>

function cadenceText(c){
  if(!c||c.scheduleMode==='Immediate'||!c.scheduleMode) return 'Hemen';
  const cap=c.postsPerDay>0?` · ≤${c.postsPerDay}/gün`:'';
  if(c.scheduleMode==='DailySlots') return `Saatler: ${h(c.dailyTimes||'—')}${cap}`;
  if(c.scheduleMode==='Interval') return `Her ${c.intervalMinutes||0} dk${cap}`;
  return c.scheduleMode;
}

  bar.addEventListener('click',async e=>{ const st=e.target.dataset.b; if(!st)return; const ids=selIds();

    try{ const r=await api('/comments/bulk',{method:'POST',body:{ids,status:st}}); toast(`${r.updated} yorum güncellendi`); load(); }catch(e){toast(e.message,true);} });
  box.addEventListener('click',async e=>{ const pg=e.target.closest('[data-pg]'); if(pg){ page=Math.max(1,+pg.dataset.pg); return load(); }
    const tr=e.target.closest('tr[data-id]'); if(!tr)return; const id=tr.dataset.id;
    let a=null; if(e.target.classList.contains('c-ok'))a='approve'; if(e.target.classList.contains('c-no'))a='reject'; if(e.target.classList.contains('c-spam'))a='spam';
    if(!a)return; try{ await api(`/comments/${id}/${a}`,{method:'POST'}); toast('Yorum '+actMap[a]); load(); }catch(e){toast(e.message,true);} });
  await load();
}

/* ---------------- Acil Durdurma (kill-switch) ---------------- */
async function renderKill(){
  const [sw, cats, accs] = await Promise.all([
    api('/killswitch'), api('/categories').catch(()=>[]), api('/social-accounts').catch(()=>[])
  ]);
  const state={}; sw.forEach(s=>state[`${s.scope}|${s.key||''}`]=s);
  const isOn=(scope,key)=>{ const s=state[`${scope}|${key||''}`]; return !!(s&&s.engaged); };
  const reasonOf=(scope,key)=>{ const s=state[`${scope}|${key||''}`]; return s&&s.engaged?s.reason:null; };
  const row=(scope,key,label,note)=>{ const eng=isOn(scope,key); const r=reasonOf(scope,key);
    return `<div class="row" style="justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)">
      <div><div>${h(label)} ${eng?'<span class="chip dng">DURDURULDU</span>':'<span class="chip ok">Açık</span>'}</div>
        <div class="muted" style="font-size:11px">${h(r||note||'')}</div></div>
      <button class="btn ${eng?'':'dng'} sm ks" data-scope="${scope}" data-key="${key||''}" data-eng="${eng?1:0}">${eng?'▶ Aç':'⛔ Durdur'}</button></div>`; };
  const anyOn = sw.some(s=>s.engaged);
  $('#view').innerHTML = head('Acil Durdurma','Granular fren — hatalı bir akışı anında durdur. Değişiklik ~dakika içinde (worker döngüsü) geçerli olur; işler kaybolmaz, fren kalkınca kaldığı yerden devam eder.')
    + (anyOn?`<div class="card" style="border-color:var(--danger);background:rgba(239,91,107,.08)"><b style="color:var(--danger)">⛔ En az bir durdurma etkin.</b> Aşağıdan açabilirsin.</div>`:'')
    + `<div class="card" style="border-color:var(--danger)"><h3 style="margin-top:0;color:var(--danger)">Global</h3>
        ${row('Global','','TÜM sistem (üretim + yayın + içe aktarma)','En sert fren — her şeyi durdurur')}</div>
      <div class="card"><h3 style="margin-top:0">Sistem geneli</h3>
        ${row('Ai','','AI üretimi','Onaylanan içerik için metin/görsel üretimi durur; içerik sırada bekler')}
        ${row('Ingestion','','İçe aktarma','RSS/sayfa taraması ve keşif durur')}
        ${row('Publishing','','Yayınlama (tüm kanallar)','Hiçbir hedefe gönderilmez; yayınlar bekletilir')}
        ${row('Ads','','Reklam','Reklam yerleşimi (ileride devreye girecek)')}</div>
      <div class="card"><h3 style="margin-top:0">Kanal bazlı yayın</h3>
        ${['Telegram','X','Instagram','Threads'].map(p=>row('Channel',p,p,'Yalnız bu kanala yayını durdurur')).join('')}</div>
      <div class="card"><h3 style="margin-top:0">Kategori bazlı</h3>
        ${cats.length?cats.map(c=>row('Category',c.id,c.name,'Bu kategorinin üretim + yayın + keşfini durdurur')).join(''):'<div class="muted">Kategori yok.</div>'}</div>
      <div class="card"><h3 style="margin-top:0">Hesap bazlı yayın</h3>
        ${accs.length?accs.map(a=>row('Account',a.id,`${a.displayName} (${a.platform})`,'Bu hesap üzerinden yayını durdurur')).join(''):'<div class="muted">Hesap yok.</div>'}</div>`;
  $('#view').addEventListener('click',async e=>{ const b=e.target.closest('.ks'); if(!b)return;
    const scope=b.dataset.scope, key=b.dataset.key||null, eng=b.dataset.eng==='1', next=!eng;
    if(scope==='Global'&&next&&!confirm('TÜM sistemi (üretim + yayın + içe aktarma) durdurmak üzeresin. Emin misin?'))return;
    let reason=null; if(next){ reason=prompt('Durdurma sebebi (opsiyonel):','')||null; }
    try{ await api('/killswitch',{method:'POST',body:{scope,key,engaged:next,reason}}); toast(next?'Durduruldu':'Açıldı'); route(); }catch(e){toast(e.message,true);} });
}

async function renderSite(){
  const list = await api('/settings').catch(()=>[]);
  const cur={}; (list||[]).forEach(s=>{ if(!s.isSecret) cur[s.key]=s.maskedValue; });
  const groups=[
    ['Site & Yazar', [['site.name','Site adı','text'],['site.description','Kısa açıklama (meta)','text'],['home.author','Yazar / byline adı','text']]],
    ['Ana Sayfa', [
      ['home.featured_slug','Öne çıkan yazı — slug (boşsa en yeni)','text'],
      ['home.telegram_url','Telegram linki','text'],['home.telegram_members','Telegram üye sayısı (ör. 52.8B)','text'],
      ['home.x_url','X linki','text'],['home.x_followers','X takipçi','text'],
      ['home.instagram_url','Instagram linki','text'],['home.instagram_followers','Instagram takipçi','text'],
      ['home.threads_url','Threads linki','text'],['home.threads_followers','Threads takipçi','text'],
      ['home.youtube_url','YouTube linki','text'],['home.youtube_subscribers','YouTube abone','text']
    ]],
    ['SEO & Analytics', [
      ['seo.ga4_id','Google Analytics (GA4) — G-XXXX','text'],
      ['seo.gtm_id','Google Tag Manager — GTM-XXXX','text'],
      ['seo.gsc_verification','Search Console doğrulama kodu','text'],
      ['seo.indexnow_key','IndexNow anahtarı (Bing/Yandex)','text']
    ]],
    ['Reklam & Uyum', [
      ['home.ads_enabled','Reklamlar açık','check'],
      ['home.adsense_client','AdSense yayıncı kimliği — ca-pub-…','text'],
      ['telegram.miniapp_url','Telegram Mini App linki (ör. https://t.me/BotAdi/app)','text'],
      ['ads.adsgram_block','Adsgram Block ID (mini-app reklamı)','text'],
      ['seo.ads_min_words','Reklam için min. kelime (kısa yazıya reklam yok)','text'],
      ['seo.consent_required','Çerez onayı (consent) gerekli','check'],
      ['seo.privacy_url','Gizlilik politikası URL','text'],
      ['seo.cookie_url','Çerez politikası URL','text'],
      ['seo.ads_txt','ads.txt içeriği','area']
    ]]
  ];
  const field=(k,l,t)=>{
    const v=cur[k]||'';
    if(t==='check'){const on=(v==='1'||v==='true');return `<div class="row" style="margin-bottom:10px"><div class="s-lbl muted">${h(l)}</div><label class="row" style="margin:0"><input type="checkbox" data-key="${k}" data-check="1" ${on?'checked':''} style="width:auto"> Açık</label></div>`;}
    if(t==='area'){return `<div style="margin-bottom:10px"><div class="s-lbl muted" style="margin-bottom:4px">${h(l)}</div><textarea data-key="${k}" style="width:100%;min-height:90px">${h(v)}</textarea></div>`;}
    return `<div class="row" style="margin-bottom:10px"><div class="s-lbl muted">${h(l)}</div><input type="text" data-key="${k}" value="${h(v)}" style="flex:1;min-width:180px"></div>`;
  };
  const cards=groups.map(g=>`<div class="card"><h3 style="margin-top:0">${h(g[0])}</h3>${g[1].map(f=>field(f[0],f[1],f[2])).join('')}</div>`).join('');
  $('#view').innerHTML=head('Site / SEO','Ana sayfa, sosyal şerit, Analytics ve reklam ayarları — kaydedince yeniden deploy gerekmez')+cards+`<div class="row" style="margin:8px 0 40px"><button class="btn pri" id="site-save">Tümünü Kaydet</button></div>`;
  $('#site-save').onclick=async()=>{
    const els=[].slice.call($('#view').querySelectorAll('[data-key]'));
    try{ for(const el of els){ const k=el.getAttribute('data-key'); const val=el.getAttribute('data-check')?(el.checked?'1':'0'):el.value; await api('/settings',{method:'PUT',body:{key:k,value:val,isSecret:false}}); } toast('Kaydedildi'); }catch(e){toast(e.message,true);}
  };
}

  $('#ns-add').onclick=async()=>{ const k=$('#ns-key').value.trim(),v=$('#ns-val').value; if(!k||!v)return toast('Anahtar ve değer gerekli',true);
    try{ await api('/settings',{method:'PUT',body:{key:k,value:v,isSecret:$('#ns-sec').checked}}); toast('Kaydedildi'); route(); }catch(e){toast(e.message,true);} };

    if(!v)return toast('Değer boş',true); try{ await api('/settings',{method:'PUT',body:{key:k,value:v,isSecret:sec}}); toast('Kaydedildi'); route(); }catch(e){toast(e.message,true);} } });

/* Giriş / oturum */
function showLogin(){ $('#login').classList.add('on'); }
function hideLogin(){ $('#login').classList.remove('on'); }
$('#logout').onclick=e=>{ e.preventDefault(); setToken(null); showLogin(); };
$('#loginForm').addEventListener('submit', async e=>{
  e.preventDefault();
  const err=$('#lg-err'); err.style.display='none';
  try{
    const r=await fetch(API+'/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username:$('#lg-u').value.trim(),password:$('#lg-p').value})});
    if(!r.ok) throw 0;
    const d=await r.json(); setToken(d.token); hideLogin(); if(!location.hash) location.hash='#dashboard'; route();
  }catch{ err.textContent='E-posta veya şifre hatalı'; err.style.display='block'; }
});
async function boot(){
  if(!getToken()){ showLogin(); return; }
  try{ await api('/auth/me'); route(); }catch{ showLogin(); }
}
boot();
