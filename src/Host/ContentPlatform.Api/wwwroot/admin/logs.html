<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Loglar — İçerik Paneli</title>
<style>
  :root{
    --bg:#0d1220; --panel:#141b2d; --panel2:#1b2338; --line:#26304a;
    --txt:#e6ebf5; --muted:#8a97b3; --accent:#2dd4bf;
    --inf:#93a4c4; --wrn:#f4b74a; --err:#f2637f; --dbg:#6b7794;
    --api:#4aa3ff; --wrk:#c084fc;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--txt);
    font:13px/1.5 ui-sans-serif,system-ui,'Segoe UI',Roboto,Arial}
  header{display:flex;flex-wrap:wrap;gap:8px;align-items:center;
    padding:10px 14px;background:var(--panel);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5}
  header h1{font-size:15px;margin:0 10px 0 0;font-weight:700}
  .grp{display:flex;gap:4px;align-items:center;background:var(--panel2);
    border:1px solid var(--line);border-radius:8px;padding:3px}
  .grp label{color:var(--muted);padding:0 6px;font-size:11px}
  button,select,input{font:inherit;color:var(--txt)}
  .seg{border:0;background:transparent;color:var(--muted);padding:5px 9px;border-radius:6px;cursor:pointer}
  .seg.on{background:var(--accent);color:#04231f;font-weight:600}
  select,input[type=text]{background:var(--panel2);border:1px solid var(--line);
    border-radius:8px;padding:6px 8px;outline:none}
  input[type=text]{min-width:150px}
  .btn{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:6px 10px;cursor:pointer}
  .btn:hover{border-color:var(--accent)}
  .spacer{flex:1}
  .status{color:var(--muted);font-size:12px;white-space:nowrap}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#3a4560;margin-right:5px;vertical-align:middle}
  .dot.live{background:var(--accent);box-shadow:0 0 0 0 rgba(45,212,191,.6);animation:p 1.6s infinite}
  @keyframes p{0%{box-shadow:0 0 0 0 rgba(45,212,191,.5)}70%{box-shadow:0 0 0 6px rgba(45,212,191,0)}100%{box-shadow:0 0 0 0 rgba(45,212,191,0)}}
  #wrap{padding:0;height:calc(100vh - 52px);overflow:auto}
  table{width:100%;border-collapse:collapse;font-family:ui-monospace,'Cascadia Code',Consolas,monospace;font-size:12.5px}
  tr{border-bottom:1px solid rgba(38,48,74,.5)}
  tr:hover{background:rgba(255,255,255,.02)}
  td{padding:4px 8px;vertical-align:top}
  td.ts{color:var(--muted);white-space:nowrap;width:1%}
  td.src{width:1%;white-space:nowrap}
  td.lv{width:1%;white-space:nowrap;font-weight:700}
  td.msg{white-space:pre-wrap;word-break:break-word}
  .tag{display:inline-block;padding:1px 6px;border-radius:5px;font-size:10.5px;font-weight:700}
  .tag.api{color:#04203f;background:var(--api)}
  .tag.wrk{color:#2a0a45;background:var(--wrk)}
  .lv-inf{color:var(--inf)} .lv-wrn{color:var(--wrn)} .lv-err{color:var(--err)}
  .lv-dbg{color:var(--dbg)} .lv-vrb{color:var(--dbg)} .lv-ftl{color:#fff;background:var(--err);padding:0 4px;border-radius:4px}
  .ctx{color:var(--accent);opacity:.8}
  .exc{color:var(--err);background:rgba(242,99,127,.07);border-left:2px solid var(--err);
    margin:4px 0 2px;padding:6px 8px;white-space:pre-wrap;border-radius:4px;font-size:11.5px}
  .empty{color:var(--muted);text-align:center;padding:40px}
  /* login */
  #login{position:fixed;inset:0;background:rgba(6,10,18,.92);display:none;align-items:center;justify-content:center;z-index:20}
  #login.show{display:flex}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:26px;width:340px}
  .card h2{margin:0 0 4px} .card p{color:var(--muted);margin:0 0 16px;font-size:12px}
  .card label{display:block;color:var(--muted);font-size:12px;margin:10px 0 4px}
  .card input{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:10px}
  .card button{width:100%;margin-top:16px;background:var(--accent);color:#04231f;border:0;border-radius:10px;padding:11px;font-weight:700;cursor:pointer}
  .err-msg{color:var(--err);font-size:12px;margin-top:10px;min-height:16px}
</style>
</head>
<body>
<header>
  <h1>Loglar</h1>

  <div class="grp" id="srcGrp">
    <label>Kaynak</label>
    <button class="seg on" data-src="">Hepsi</button>
    <button class="seg" data-src="api">API</button>
    <button class="seg" data-src="worker">Worker</button>
  </div>

  <div class="grp" id="lvlGrp">
    <label>Seviye</label>
    <button class="seg on" data-lvl="">Hepsi</button>
    <button class="seg" data-lvl="information">Bilgi+</button>
    <button class="seg" data-lvl="warning">Uyarı+</button>
    <button class="seg" data-lvl="error">Hata</button>
  </div>

  <div class="grp">
    <label>Süre</label>
    <select id="minutes">
      <option value="10">10 dk</option>
      <option value="30" selected>30 dk</option>
      <option value="60">1 saat</option>
      <option value="120">2 saat</option>
    </select>
  </div>

  <input type="text" id="q" placeholder="ara… (mesaj / hata)">

  <div class="spacer"></div>

  <button class="seg on" id="autoBtn"><span class="dot live" id="dot"></span>Canlı</button>
  <button class="btn" id="refreshBtn">Yenile</button>
  <span class="status" id="status">—</span>
</header>

<div id="wrap"><table><tbody id="rows"></tbody></table>
  <div class="empty" id="empty">Yükleniyor…</div>
</div>

<div id="login">
  <form class="card" id="loginForm">
    <h2>Giriş</h2>
    <p>Log ekranını görmek için admin girişi gerekli.</p>
    <label>E-posta</label>
    <input type="text" id="lg-user" autocomplete="username">
    <label>Şifre</label>
    <input type="password" id="lg-pass" autocomplete="current-password">
    <button type="submit">Giriş yap</button>
    <div class="err-msg" id="lg-err"></div>
  </form>
</div>

<script>
const API="/api/v1";
const $=s=>document.querySelector(s);
const getToken=()=>localStorage.getItem('cp_token');
const setToken=t=>t?localStorage.setItem('cp_token',t):localStorage.removeItem('cp_token');

let src="", lvl="", auto=true, timer=null, atBottom=true;

// --- segment butonları ---
function seg(groupSel, attr, cb){
  document.querySelectorAll(groupSel+' .seg').forEach(b=>b.onclick=()=>{
    document.querySelectorAll(groupSel+' .seg').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); cb(b.getAttribute(attr)); load();
  });
}
seg('#srcGrp','data-src',v=>src=v);
seg('#lvlGrp','data-lvl',v=>lvl=v);
$('#minutes').onchange=load;
let qTimer; $('#q').oninput=()=>{clearTimeout(qTimer);qTimer=setTimeout(load,350);};
$('#refreshBtn').onclick=load;
$('#autoBtn').onclick=()=>{auto=!auto;$('#autoBtn').classList.toggle('on',auto);
  $('#dot').className='dot'+(auto?' live':'');schedule();};

const wrap=$('#wrap');
wrap.onscroll=()=>{atBottom = wrap.scrollHeight-wrap.scrollTop-wrap.clientHeight < 40;};

function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function lvlClass(l){l=(l||'').toLowerCase();
  return l.startsWith('err')?'lv-err':l.startsWith('warn')?'lv-wrn':
         l.startsWith('inf')?'lv-inf':l.startsWith('fat')?'lv-ftl':'lv-dbg';}
function lvlShort(l){l=(l||'').toLowerCase();return {information:'INF',warning:'WRN',error:'ERR',
  fatal:'FTL',debug:'DBG',verbose:'VRB'}[l]||l.slice(0,3).toUpperCase();}
function ctxShort(c){if(!c)return'';const i=c.lastIndexOf('.');return i>=0?c.slice(i+1):c;}
function fmtTs(iso){try{const d=new Date(iso);
  return d.toLocaleString('tr-TR',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'})
    +'.'+String(d.getMilliseconds()).padStart(3,'0');}catch{return iso;}}

async function api(path){
  const r=await fetch(API+path,{headers:{Authorization:'Bearer '+(getToken()||'')}});
  if(r.status===401){throw {unauth:true};}
  if(!r.ok) throw new Error('HTTP '+r.status);
  return r.json();
}

async function load(){
  if(!getToken()){showLogin();return;}
  const m=$('#minutes').value, q=encodeURIComponent($('#q').value.trim());
  let path=`/logs?minutes=${m}&limit=2000`;
  if(src) path+=`&source=${src}`;
  if(lvl) path+=`&level=${lvl}`;
  if(q) path+=`&q=${q}`;
  try{
    const d=await api(path);
    render(d.entries||[]);
    $('#status').textContent=`${d.count} kayıt · ${new Date().toLocaleTimeString('tr-TR')}`;
    hideLogin();
  }catch(e){
    if(e && e.unauth){setToken(null);showLogin();}
    else $('#status').textContent='hata: '+(e.message||e);
  }
}

function render(entries){
  const rows=$('#rows'), empty=$('#empty');
  if(!entries.length){rows.innerHTML='';empty.style.display='block';empty.textContent='Bu pencerede kayıt yok.';return;}
  empty.style.display='none';
  rows.innerHTML=entries.map(e=>{
    const tag=e.source==='worker'?'<span class="tag wrk">WRK</span>':'<span class="tag api">API</span>';
    const ctx=e.context?`<span class="ctx">${esc(ctxShort(e.context))}</span> `:'';
    const exc=e.exception?`<div class="exc">${esc(e.exception)}</div>`:'';
    return `<tr>
      <td class="ts">${fmtTs(e.timestamp)}</td>
      <td class="src">${tag}</td>
      <td class="lv ${lvlClass(e.level)}">${lvlShort(e.level)}</td>
      <td class="msg">${ctx}${esc(e.message)}${exc}</td></tr>`;
  }).join('');
  if(auto && atBottom) wrap.scrollTop=wrap.scrollHeight;
}

function schedule(){clearInterval(timer);if(auto)timer=setInterval(load,4000);}

// --- login ---
function showLogin(){$('#login').classList.add('show');$('#empty').textContent='Giriş bekleniyor…';
  const u=$('#lg-user');if(u&&!u.value)u.focus();}
function hideLogin(){$('#login').classList.remove('show');}
$('#loginForm').onsubmit=async ev=>{
  ev.preventDefault();$('#lg-err').textContent='';
  try{
    const r=await fetch(API+'/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username:$('#lg-user').value.trim(),password:$('#lg-pass').value})});
    if(!r.ok){$('#lg-err').textContent='E-posta veya şifre hatalı';return;}
    const d=await r.json();setToken(d.token);hideLogin();load();
  }catch(e){$('#lg-err').textContent='Bağlantı hatası';}
};

load();schedule();
</script>
</body>
</html>
